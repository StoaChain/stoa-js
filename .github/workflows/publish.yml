name: Publish to npmjs.org

# Triggered by pushing a version tag (e.g. v4.0.0).
#
# v4.0.0 (monorepo split): smart per-package publish. A single shared
# tag `vX.Y.Z` triggers this workflow, which then detects which
# packages have a `package.json` version matching the tag and publishes
# only those. Use cases:
#
#   - Atomic release (BOTH packages bump): tag both at vX.Y.Z, both
#     publish. v4.0.0 is exactly this (the monorepo split itself).
#   - stoa-core-only release: bump only `packages/stoa-core/package.
#     json` to vX.Y.Z, leave ouronet-core at the previous version,
#     tag vX.Y.Z. Only stoa-core publishes. Example: v4.1.0 (the
#     selective `@kadena/client` vendoring) is expected to look like
#     this — the ouronet-core consumer surface doesn't change.
#   - ouronet-core-only release: same shape, mirrored.
#
# At least one package MUST match the tag — otherwise the tag is wrong
# and the workflow fails before npm sees a single byte.
#
# Doc gates (README + CHANGELOG version-parity) only apply to packages
# in the publish queue. A non-published package's docs are untouched
# — they continue to reflect the version that IS on npmjs.com for that
# package.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Smart per-package publish
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The default GITHUB_TOKEN has read-only `contents` scope. Creating
    # a Release via `gh release create` requires `contents: write`.
    # `id-token: write` is required for npm publish's `--provenance`
    # flag — npm uses the OIDC token GitHub Actions issues via this
    # permission to mint a SLSA attestation linking the published
    # tarball to the exact workflow run that produced it.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plain Node setup — no registry-url here so setup-node doesn't
      # write its own scoped .npmrc. We write the root .npmrc ourselves
      # in the next step.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Explicit .npmrc for the publish — written at the repo root so
      # npm picks it up regardless of working directory. `always-auth`
      # + the registry-specific _authToken line is the canonical pattern
      # npm itself documents for CI publishing.
      - name: Write .npmrc with auth token
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPMPUSHER }}
          @stoachain:registry=https://registry.npmjs.org
          always-auth=true
          EOF
          echo "--- .npmrc structure (token redacted) ---"
          sed 's|=.*|=***|' .npmrc

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      # Belt-and-suspenders: typecheck + build + tests gate the publish
      # so a broken core never makes it to the registry. The root scripts
      # iterate over all 3 workspaces; build is ordered kadena-stoic-legacy
      # → stoa-core → ouronet-core, matching the publish order below.
      #
      # ORDER: typecheck → build → test. Build MUST precede test because
      # stoa-core's tests resolve `@stoachain/kadena-stoic-legacy/*`
      # imports through Node's standard module resolution (no
      # resolve.alias for kadena-stoic-legacy in stoa-core's
      # vitest.config.ts — vendored CJS source layout is incompatible
      # with vitest's transform layer; documented at
      # packages/stoa-core/vitest.config.ts:3-25). Module resolution flows
      # via the kadena-stoic-legacy package's `exports` map → `dist/*/
      # index.js`. If `dist/` doesn't exist when tests run, Node throws
      # ERR_MODULE_NOT_FOUND. On a CI fresh checkout `dist/` is absent
      # until the build step creates it.
      - name: Typecheck + Build + Test (all 3 packages)
        run: |
          npm run typecheck
          npm run build
          npm test

      # ------------------------------------------------------------------
      # Per-package publish-queue detection (the smart bit)
      # ------------------------------------------------------------------
      # Build a queue of packages whose `package.json` version equals the
      # tag. Subsequent steps run for each queued package only. The queue
      # is exposed via step outputs:
      #   - PUBLISH_KADENA_STOIC_LEGACY ("true" | "false")
      #   - PUBLISH_STOA_CORE           ("true" | "false")
      #   - PUBLISH_OURONET_CORE        ("true" | "false")
      #
      # If none matches, fail the workflow — the tag is wrong.
      - name: Detect publish queue (which packages match the tag?)
        id: queue
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          KSL_VERSION=$(node -p "require('./packages/kadena-stoic-legacy/package.json').version")
          STOA_VERSION=$(node -p "require('./packages/stoa-core/package.json').version")
          OURO_VERSION=$(node -p "require('./packages/ouronet-core/package.json').version")
          CODEX_VERSION=$(node -p "require('./packages/ouronet-codex/package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "kadena-stoic-legacy version: $KSL_VERSION"
          echo "stoa-core version: $STOA_VERSION"
          echo "ouronet-core version: $OURO_VERSION"
          echo "ouronet-codex version: $CODEX_VERSION"

          PUBLISH_KSL="false"
          PUBLISH_STOA="false"
          PUBLISH_OURO="false"
          PUBLISH_CODEX="false"

          if [ "$TAG_VERSION" = "$KSL_VERSION" ]; then
            PUBLISH_KSL="true"
          fi
          if [ "$TAG_VERSION" = "$STOA_VERSION" ]; then
            PUBLISH_STOA="true"
          fi
          if [ "$TAG_VERSION" = "$OURO_VERSION" ]; then
            PUBLISH_OURO="true"
          fi
          if [ "$TAG_VERSION" = "$CODEX_VERSION" ]; then
            PUBLISH_CODEX="true"
          fi

          if [ "$PUBLISH_KSL" = "false" ] && [ "$PUBLISH_STOA" = "false" ] && [ "$PUBLISH_OURO" = "false" ] && [ "$PUBLISH_CODEX" = "false" ]; then
            echo "::error::Tag $TAG_VERSION matches NONE of the package.json versions (kadena-stoic-legacy=$KSL_VERSION, stoa-core=$STOA_VERSION, ouronet-core=$OURO_VERSION, ouronet-codex=$CODEX_VERSION)"
            echo "::error::Tags must match at least one package's version. Bump packages/{kadena-stoic-legacy,stoa-core,ouronet-core,ouronet-codex}/package.json to $TAG_VERSION before tagging."
            exit 1
          fi

          echo "PUBLISH_KADENA_STOIC_LEGACY=$PUBLISH_KSL" >> "$GITHUB_OUTPUT"
          echo "PUBLISH_STOA_CORE=$PUBLISH_STOA"          >> "$GITHUB_OUTPUT"
          echo "PUBLISH_OURONET_CORE=$PUBLISH_OURO"       >> "$GITHUB_OUTPUT"
          echo "PUBLISH_OURONET_CODEX=$PUBLISH_CODEX"     >> "$GITHUB_OUTPUT"
          echo "TAG_VERSION=$TAG_VERSION"                 >> "$GITHUB_OUTPUT"

          echo ""
          echo "── Publish queue ──"
          echo "  @stoachain/kadena-stoic-legacy: $PUBLISH_KSL"
          echo "  @stoachain/stoa-core:           $PUBLISH_STOA"
          echo "  @stoachain/ouronet-core:        $PUBLISH_OURO"
          echo "  @stoachain/ouronet-codex:       $PUBLISH_CODEX"

      # ------------------------------------------------------------------
      # Per-queued-package README + CHANGELOG version-parity gate
      # ------------------------------------------------------------------
      # The v3.x lessons (v2.1.0/v2.1.1/v2.1.2 README staleness) carry
      # forward into the dual-package world. Each package has its own
      # README + CHANGELOG visible on npmjs.com — both must reference
      # the version being shipped, ON THE PACKAGE THAT IS SHIPPING. A
      # package not in the publish queue is skipped (its docs still
      # reflect the version that IS on npmjs.com).
      - name: Verify README + CHANGELOG of queued packages mention the publish version
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          PUBLISH_KSL="${{ steps.queue.outputs.PUBLISH_KADENA_STOIC_LEGACY }}"
          PUBLISH_STOA="${{ steps.queue.outputs.PUBLISH_STOA_CORE }}"
          PUBLISH_OURO="${{ steps.queue.outputs.PUBLISH_OURONET_CORE }}"
          PUBLISH_CODEX="${{ steps.queue.outputs.PUBLISH_OURONET_CODEX }}"

          QUEUED=()
          [ "$PUBLISH_KSL" = "true" ] && QUEUED+=("packages/kadena-stoic-legacy")
          [ "$PUBLISH_STOA" = "true" ] && QUEUED+=("packages/stoa-core")
          [ "$PUBLISH_OURO" = "true" ] && QUEUED+=("packages/ouronet-core")
          [ "$PUBLISH_CODEX" = "true" ] && QUEUED+=("packages/ouronet-codex")

          for PKG_DIR in "${QUEUED[@]}"; do
            PKG_NAME=$(node -p "require('./${PKG_DIR}/package.json').name")
            echo "── Validating ${PKG_NAME} ──"

            # README: ## Status block must reference the version
            if ! grep -qE "\`${TAG_VERSION}\`[[:space:]]+on public npmjs" "${PKG_DIR}/README.md"; then
              echo "::error::${PKG_DIR}/README.md ## Status block does not lead with version ${TAG_VERSION}"
              echo "::error::Expected: a line containing \`${TAG_VERSION}\` on public npmjs"
              exit 1
            fi
            echo "✓ ${PKG_DIR}/README.md ## Status block references ${TAG_VERSION}"

            # README: version history must contain a **vX.Y.Z** entry
            if ! grep -qE "^\*\*v${TAG_VERSION}\*\*[[:space:]]" "${PKG_DIR}/README.md"; then
              echo "::error::${PKG_DIR}/README.md version history is missing a **v${TAG_VERSION}** paragraph"
              exit 1
            fi
            echo "✓ ${PKG_DIR}/README.md version history contains **v${TAG_VERSION}** entry"

            # CHANGELOG: first ## heading must be the version
            FIRST_HEADING=$(grep -m1 '^## ' "${PKG_DIR}/CHANGELOG.md")
            if ! echo "$FIRST_HEADING" | grep -qE "^## ${TAG_VERSION}[[:space:]]"; then
              echo "::error::${PKG_DIR}/CHANGELOG.md's first ## heading does not match version ${TAG_VERSION}"
              echo "::error::First heading found: ${FIRST_HEADING}"
              exit 1
            fi
            echo "✓ ${PKG_DIR}/CHANGELOG.md leads with: ${FIRST_HEADING}"
          done
          echo "All documentation gates passed for queued packages at v${TAG_VERSION}."

      - name: Verify npm auth
        run: |
          echo "Checking npm whoami..."
          npm whoami || echo "::warning::whoami failed — publish may too"

      # ------------------------------------------------------------------
      # Idempotent publish — skip if the version already exists on npm
      # ------------------------------------------------------------------
      # If pollinate (or a manual re-tag-push) re-runs this workflow
      # after a partial failure, `npm publish` would fail with
      # "version already published". Pre-check via `npm view` and skip
      # — the registry is the source of truth.
      #
      # ORDER MATTERS:
      #   1. kadena-stoic-legacy first — has zero @stoachain/* peer-deps;
      #      both stoa-core and ouronet-core peer-dep on it.
      #   2. stoa-core second — peer-deps on kadena-stoic-legacy;
      #      ouronet-core peer-deps on stoa-core.
      #   3. ouronet-core third — peer-deps on both above.
      # If a step fails, subsequent steps don't run (set -e via the
      # run-step contract). When an upstream is NOT in the queue (e.g.
      # ouronet-core-only release), the peer-dep version is already on
      # npm by definition — we wouldn't have skipped it from the queue
      # otherwise.

      - name: Publish @stoachain/kadena-stoic-legacy to npmjs.org
        if: steps.queue.outputs.PUBLISH_KADENA_STOIC_LEGACY == 'true'
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @stoachain/kadena-stoic-legacy@${TAG_VERSION} version >/dev/null 2>&1; then
            echo "@stoachain/kadena-stoic-legacy@${TAG_VERSION} already on npm — skipping (idempotent)."
          else
            npm publish --workspace=@stoachain/kadena-stoic-legacy --access public --provenance
          fi

      - name: Publish @stoachain/stoa-core to npmjs.org
        if: steps.queue.outputs.PUBLISH_STOA_CORE == 'true'
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @stoachain/stoa-core@${TAG_VERSION} version >/dev/null 2>&1; then
            echo "@stoachain/stoa-core@${TAG_VERSION} already on npm — skipping (idempotent)."
          else
            npm publish --workspace=@stoachain/stoa-core --access public --provenance
          fi

      - name: Publish @stoachain/ouronet-core to npmjs.org
        if: steps.queue.outputs.PUBLISH_OURONET_CORE == 'true'
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @stoachain/ouronet-core@${TAG_VERSION} version >/dev/null 2>&1; then
            echo "@stoachain/ouronet-core@${TAG_VERSION} already on npm — skipping (idempotent)."
          else
            npm publish --workspace=@stoachain/ouronet-core --access public --provenance
          fi

      # @stoachain/ouronet-codex has independent semver (v0.x alpha track)
      # — peer-deps the v4.2 atomic triplet but is NOT part of the triplet
      # lock. Publishes with `--tag alpha` while in v0.x so consumers
      # don't get pre-1.0 surface as `latest`. v1.0.0 will drop the
      # `--tag alpha` and become the default install.
      - name: Publish @stoachain/ouronet-codex to npmjs.org (alpha while v0.x)
        if: steps.queue.outputs.PUBLISH_OURONET_CODEX == 'true'
        run: |
          TAG_VERSION="${{ steps.queue.outputs.TAG_VERSION }}"
          if npm view @stoachain/ouronet-codex@${TAG_VERSION} version >/dev/null 2>&1; then
            echo "@stoachain/ouronet-codex@${TAG_VERSION} already on npm — skipping (idempotent)."
          else
            # Per spec §8 Q6: alpha dist-tag while in v0.x, promoted to
            # 'latest' at v1.0.0 (after OuronetUI + AncientHoldings have
            # both integrated cleanly).
            DIST_TAG="alpha"
            case "$TAG_VERSION" in
              0.*) DIST_TAG="alpha" ;;
              *)   DIST_TAG="latest" ;;
            esac
            echo "Publishing @stoachain/ouronet-codex@${TAG_VERSION} with dist-tag '${DIST_TAG}'"
            npm publish --workspace=@stoachain/ouronet-codex --access public --provenance --tag "${DIST_TAG}"
          fi

      # ------------------------------------------------------------------
      # GitHub Release creation (single Release per tag, regardless of
      # which packages it shipped)
      # ------------------------------------------------------------------
      # The Release body is the annotated-tag message, which the
      # release-author writes to cover whichever packages this tag
      # ships. Per-package granular history lives in
      # `packages/{pkg}/CHANGELOG.md` and on npmjs.com.
      - name: Create GitHub Release for the pushed tag
        env:
          # Prefer a user-supplied PAT (RELEASE_TOKEN) when present —
          # bypasses any org-level "Workflow permissions" lockdown that
          # caps the auto-provided GITHUB_TOKEN at read-only. Falls back
          # to GITHUB_TOKEN when the org policy allows write or when
          # the secret is unset.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Skip if Release already exists (idempotent — supports manual re-runs).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-from-tag \
              --latest
            echo "Created GitHub Release for $TAG."
          fi

      # ------------------------------------------------------------------
      # Retroactive Release backfill (idempotent)
      # ------------------------------------------------------------------
      # Pre-stoa-js the v1.7.0/v2.0.0/v2.0.1/v2.0.2/v2.0.3 tags shipped
      # before the auto-Release step existed. This loop creates them
      # from the existing annotated-tag messages on every workflow run
      # (idempotent — `gh release view` short-circuits when the
      # Release already exists). All v3.x tags carry their Releases
      # already; this list is finalised history.
      - name: Backfill GitHub Releases for prior tags (idempotent)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          for PRIOR_TAG in v1.7.0 v2.0.0 v2.0.1 v2.0.2 v2.0.3; do
            if gh release view "$PRIOR_TAG" >/dev/null 2>&1; then
              echo "Backfill: $PRIOR_TAG Release already exists — skipping."
            else
              if git rev-parse "$PRIOR_TAG" >/dev/null 2>&1; then
                gh release create "$PRIOR_TAG" \
                  --title "$PRIOR_TAG" \
                  --notes-from-tag
                echo "Backfilled GitHub Release for $PRIOR_TAG."
              else
                echo "Backfill: tag $PRIOR_TAG does not exist in repo — skipping."
              fi
            fi
          done
