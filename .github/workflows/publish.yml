name: Publish to npmjs.org

# Triggered by pushing a version tag (e.g. v1.2.0).
# Publishes this package to the public npmjs.org registry under the
# @stoachain scope so OuronetUI, HUB, and any other consumer can
# `npm install @stoachain/ouronet-core@^X.Y.Z` without auth.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # The default GITHUB_TOKEN has read-only `contents` scope. Creating
    # a Release via `gh release create` requires `contents: write`.
    # Without this block the v2.0.1 publish-workflow run failed at the
    # "Create GitHub Release for the pushed tag" step with a 403 from
    # the GitHub Releases API. Granting `contents: write` here scopes
    # the token to *just* what the Release-creation step needs.
    #
    # `id-token: write` (added in v3.3.1) is required for npm publish's
    # `--provenance` flag — npm uses the OIDC token GitHub Actions issues
    # via this permission to mint a SLSA attestation linking the published
    # tarball to the exact workflow run that produced it. Without this
    # permission, `npm publish --provenance` silently skips the attestation
    # step. Pre-v3.3.1 every v3.x release shipped without provenance
    # attestations (visible as 404 on `npm/-/npm/v1/attestations/{pkg}@{ver}`);
    # v3.3.1 onwards every release carries verifiable provenance.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Plain Node setup — no registry-url here so setup-node doesn't
      # write its own scoped .npmrc. We write the root .npmrc ourselves
      # in the next step (more reliable than setup-node's scope flag).
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Explicit .npmrc for the publish — written at the repo root so
      # npm picks it up regardless of working directory. `always-auth`
      # + the registry-specific _authToken line is the canonical pattern
      # npm itself documents for CI publishing.
      - name: Write .npmrc with auth token
        run: |
          cat > .npmrc <<EOF
          //registry.npmjs.org/:_authToken=${{ secrets.NPMPUSHER }}
          @stoachain:registry=https://registry.npmjs.org
          always-auth=true
          EOF
          echo "--- .npmrc structure (token redacted) ---"
          sed 's|=.*|=***|' .npmrc

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      # Belt-and-suspenders: tests + build gate the publish so a broken
      # core never makes it to the registry.
      - name: Typecheck + Test + Build
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag $TAG_VERSION matches package.json — proceeding"

      # ------------------------------------------------------------------
      # README + CHANGELOG version-parity gate (bulletproof against stale docs)
      # ------------------------------------------------------------------
      # Reason: the v2.1.0 → v2.1.1 cycle and the v2.1.2 cycle both surfaced
      # README staleness — README ## Status block lagging behind the version
      # being shipped. The npm package page shows the README as primary
      # consumer-facing documentation, so a stale Status block on a fresh
      # publish leaves consumers reading documentation that contradicts the
      # version they just installed. v2.1.1 was a dedicated catch-up patch
      # for exactly this drift class.
      #
      # This step is the structural fix: before `npm publish` runs, fail
      # the workflow if README.md or CHANGELOG.md don't reference the
      # version being shipped. Stale-README ships become physically
      # impossible — the publish never happens.
      - name: Verify README + CHANGELOG mention the publish version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Validating that README.md and CHANGELOG.md reference v${TAG_VERSION}..."

          # Check 1: README.md's ## Status block must reference the version.
          # The convention (visible in v2.1.0+ history) is the Status block's
          # opening paragraph leads with backtick-quoted version.
          if ! grep -qE "\`${TAG_VERSION}\`[[:space:]]+on public npmjs" README.md; then
            echo "::error::README.md ## Status block does not lead with version ${TAG_VERSION}"
            echo "::error::Expected: a line containing \`${TAG_VERSION}\` on public npmjs"
            echo "::error::Bump the README ## Status block before tagging the next release."
            grep -nE 'on public npmjs' README.md || echo "(no Status-block match found at all)"
            exit 1
          fi
          echo "✓ README.md ## Status block references ${TAG_VERSION}"

          # Check 2: README.md version history must contain a v${TAG_VERSION}
          # paragraph (e.g., "**v2.1.2** — ..."). This is the per-version
          # entry consumers read for what changed.
          if ! grep -qE "^\*\*v${TAG_VERSION}\*\*[[:space:]]" README.md; then
            echo "::error::README.md version history is missing a **v${TAG_VERSION}** paragraph"
            echo "::error::Add a v${TAG_VERSION} entry to the version history section before tagging."
            exit 1
          fi
          echo "✓ README.md version history contains **v${TAG_VERSION}** entry"

          # Check 3: CHANGELOG.md's first heading must be the version.
          FIRST_HEADING=$(grep -m1 '^## ' CHANGELOG.md)
          if ! echo "$FIRST_HEADING" | grep -qE "^## ${TAG_VERSION}[[:space:]]"; then
            echo "::error::CHANGELOG.md's first ## heading does not match version ${TAG_VERSION}"
            echo "::error::First heading found: ${FIRST_HEADING}"
            echo "::error::Expected first heading: ## ${TAG_VERSION} — YYYY-MM-DD"
            exit 1
          fi
          echo "✓ CHANGELOG.md leads with: ${FIRST_HEADING}"

          echo "All documentation gates passed for v${TAG_VERSION} — proceeding to publish."

      - name: Verify npm auth
        run: |
          echo "Checking npm whoami..."
          npm whoami || echo "::warning::whoami failed — publish may too"

      # v3.3.1: `--provenance` flag added to attach a SLSA attestation
      # linking the published tarball to this exact workflow run (npm 9.5+).
      # Requires `id-token: write` permission at the workflow level (set
      # above). npmjs.com displays a "Provenance" badge on the package
      # version page once the attestation is verified.
      - name: Publish to npmjs.org
        run: npm publish --access public --provenance

      # ------------------------------------------------------------------
      # GitHub Release creation
      # ------------------------------------------------------------------
      # Reason: a git tag is just a commit pointer — it does NOT create a
      # user-facing GitHub Release. Without this step the Releases page
      # stays empty and consumers have no discoverable changelog on GitHub.
      # We use the `gh` CLI (pre-installed on ubuntu-latest runners) which
      # auto-authenticates with $GH_TOKEN. The `--notes-from-tag` flag uses
      # the annotated tag's message as the Release body — exactly what was
      # already provided in `git tag -a vX.Y.Z -m "..."`.
      #
      # v3.3.1 (workflow patch): the `--repo` flag was DROPPED from both
      # `gh release create` and `gh release view` calls. Around 2026-04-30
      # the GitHub-hosted runners' gh CLI image started rejecting the
      # `gh release create --notes-from-tag --repo X` flag combination
      # (the exact failure was logged on every v3.0.0..v3.3.0 release; in
      # each case `/bee:pollinate`'s Step 9c REST-API fallback created the
      # Release manually). Dropping `--repo` lets gh auto-detect the repo
      # from the working-directory context (set by `actions/checkout@v4`
      # at the top of this job), which IS the repo we want anyway. This
      # eliminates the recurring REST-fallback dependency.
      - name: Create GitHub Release for the pushed tag
        env:
          # Prefer a user-supplied PAT (RELEASE_TOKEN) when present —
          # bypasses any org-level "Workflow permissions" lockdown that
          # caps the auto-provided GITHUB_TOKEN at read-only. Falls back
          # to GITHUB_TOKEN when the org policy allows write or when
          # the secret is unset.
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Skip if Release already exists (idempotent — supports manual re-runs).
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release for $TAG already exists — skipping."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-from-tag \
              --latest
            echo "Created GitHub Release for $TAG."
          fi

      # ------------------------------------------------------------------
      # Retroactive Release backfill (idempotent)
      # ------------------------------------------------------------------
      # Reason: v1.7.0 and v2.0.0 shipped to npm before the auto-Release
      # step existed, so their GitHub Releases pages are missing. This step
      # creates them from the existing annotated-tag messages on every run
      # (idempotent — `gh release view` short-circuits if the Release
      # already exists). Once both are backfilled this becomes a no-op.
      # v3.3.1 (workflow patch): same `--repo` drop as the main Release
      # step above. By this point in the workflow the v3.x backfill list
      # is fully satisfied (verified at every pollinate run via Step 10's
      # tag-vs-release diff), so the loop body is a no-op for current
      # tags. Kept in place for future-tag backfill if a Release ever
      # gets manually deleted from the GitHub UI.
      - name: Backfill GitHub Releases for prior tags (idempotent)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          for PRIOR_TAG in v1.7.0 v2.0.0 v2.0.1 v2.0.2 v2.0.3; do
            if gh release view "$PRIOR_TAG" >/dev/null 2>&1; then
              echo "Backfill: $PRIOR_TAG Release already exists — skipping."
            else
              # Verify the tag actually exists in the repo before attempting
              # to create a Release for it.
              if git rev-parse "$PRIOR_TAG" >/dev/null 2>&1; then
                gh release create "$PRIOR_TAG" \
                  --title "$PRIOR_TAG" \
                  --notes-from-tag
                echo "Backfilled GitHub Release for $PRIOR_TAG."
              else
                echo "Backfill: tag $PRIOR_TAG does not exist in repo — skipping."
              fi
            fi
          done
